name: Update World Cup Scores

on:
  schedule:
    - cron: '*/1 * * * *'  # Every 1 minute
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Fetch World Cup data
        env:
          API_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: |
          curl -s -H "X-Auth-Token: $API_KEY" \
            "https://api.football-data.org/v4/competitions/WC/matches" \
            -o api_matches.json
          
          curl -s -H "X-Auth-Token: $API_KEY" \
            "https://api.football-data.org/v4/competitions/WC/standings" \
            -o api_standings.json

      - name: Process data
        run: |
          cat > process.js << 'EOF'
          const fs = require('fs');

          const FLAGS = {
            'Afghanistan': '🇦🇫', 'Albania': '🇦🇱', 'Algeria': '🇩🇿', 'American Samoa': '🇦🇸',
            'Andorra': '🇦🇩', 'Angola': '🇦🇴', 'Anguilla': '🇦🇮', 'Antigua and Barbuda': '🇦🇬',
            'Argentina': '🇦🇷', 'Armenia': '🇦🇲', 'Aruba': '🇦🇼', 'Australia': '🇦🇺',
            'Austria': '🇦🇹', 'Azerbaijan': '🇦🇿', 'Bahamas': '🇧🇸', 'Bahrain': '🇧🇭',
            'Bangladesh': '🇧🇩', 'Barbados': '🇧🇧', 'Belarus': '🇧🇾', 'Belgium': '🇧🇪',
            'Belize': '🇧🇿', 'Benin': '🇧🇯', 'Bermuda': '🇧🇲', 'Bhutan': '🇧🇹',
            'Bolivia': '🇧🇴', 'Bosnia and Herzegovina': '🇧🇦', 'Botswana': '🇧🇼',
            'Brazil': '🇧🇷', 'British Virgin Islands': '🇻🇬', 'Brunei': '🇧🇳',
            'Bulgaria': '🇧🇬', 'Burkina Faso': '🇧🇫', 'Burundi': '🇧🇮', 'Cambodia': '🇰🇭',
            'Cameroon': '🇨🇲', 'Canada': '🇨🇦', 'Cape Verde': '🇨🇻', 'Cayman Islands': '🇰🇾',
            'Central African Republic': '🇨🇫', 'Chad': '🇹🇩', 'Chile': '🇨🇱',
            'China PR': '🇨🇳', 'Colombia': '🇨🇴', 'Comoros': '🇰🇲', 'Congo': '🇨🇬',
            'Congo DR': '🇨🇩', 'Cook Islands': '🇨🇰', 'Costa Rica': '🇨🇷', 'Croatia': '🇭🇷',
            'Cuba': '🇨🇺', 'Curaçao': '🇨🇼', 'Cyprus': '🇨🇾', 'Czech Republic': '🇨🇿',
            'Denmark': '🇩🇰', 'Djibouti': '🇩🇯', 'Dominica': '🇩🇲', 'Dominican Republic': '🇩🇴',
            'Ecuador': '🇪🇨', 'Egypt': '🇪🇬', 'El Salvador': '🇸🇻', 'England': '🏴󠁧󠁢󠁥󠁮󠁧󠁿',
            'Equatorial Guinea': '🇬🇶', 'Eritrea': '🇪🇷', 'Estonia': '🇪🇪', 'Eswatini': '🇸🇿',
            'Ethiopia': '🇪🇹', 'Faroe Islands': '🇫🇴', 'Fiji': '🇫🇯', 'Finland': '🇫🇮',
            'France': '🇫🇷', 'Gabon': '🇬🇦', 'Gambia': '🇬🇲', 'Georgia': '🇬🇪',
            'Germany': '🇩🇪', 'Ghana': '🇬🇭', 'Gibraltar': '🇬🇮', 'Greece': '🇬🇷',
            'Grenada': '🇬🇩', 'Guam': '🇬🇺', 'Guatemala': '🇬🇹', 'Guinea': '🇬🇳',
            'Guinea-Bissau': '🇬🇼', 'Guyana': '🇬🇾', 'Haiti': '🇭🇹', 'Honduras': '🇭🇳',
            'Hong Kong': '🇭🇰', 'Hungary': '🇭🇺', 'Iceland': '🇮🇸', 'India': '🇮🇳',
            'Indonesia': '🇮🇩', 'Iran': '🇮🇷', 'Iraq': '🇮🇶', 'Israel': '🇮🇱',
            'Italy': '🇮🇹', 'Ivory Coast': '🇨🇮', 'Jamaica': '🇯🇲', 'Japan': '🇯🇵',
            'Jordan': '🇯🇴', 'Kazakhstan': '🇰🇿', 'Kenya': '🇰🇪', 'Kiribati': '🇰🇮',
            'Korea DPR': '🇰🇵', 'Korea Republic': '🇰🇷', 'Kosovo': '🇽🇰', 'Kuwait': '🇰🇼',
            'Kyrgyzstan': '🇰🇬', 'Laos': '🇱🇦', 'Latvia': '🇱🇻', 'Lebanon': '🇱🇧',
            'Lesotho': '🇱🇸', 'Liberia': '🇱🇷', 'Libya': '🇱🇾', 'Liechtenstein': '🇱🇮',
            'Lithuania': '🇱🇹', 'Luxembourg': '🇱🇺', 'Macau': '🇲🇴', 'Madagascar': '🇲🇬',
            'Malawi': '🇲🇼', 'Malaysia': '🇲🇾', 'Maldives': '🇲🇻', 'Mali': '🇲🇱',
            'Malta': '🇲🇹', 'Marshall Islands': '🇲🇭', 'Mauritania': '🇲🇷', 'Mauritius': '🇲🇺',
            'Mexico': '🇲🇽', 'Micronesia': '🇫🇲', 'Moldova': '🇲🇩', 'Monaco': '🇲🇨',
            'Mongolia': '🇲🇳', 'Montenegro': '🇲🇪', 'Montserrat': '🇲🇸', 'Morocco': '🇲🇦',
            'Mozambique': '🇲🇿', 'Myanmar': '🇲🇲', 'Namibia': '🇳🇦', 'Nauru': '🇳🇷',
            'Nepal': '🇳🇵', 'Netherlands': '🇳🇱', 'New Caledonia': '🇳🇨', 'New Zealand': '🇳🇿',
            'Nicaragua': '🇳🇮', 'Niger': '🇳🇪', 'Nigeria': '🇳🇬', 'North Macedonia': '🇲🇰',
            'Northern Ireland': '🇬🇧', 'Northern Mariana Islands': '🇲🇵', 'Norway': '🇳🇴',
            'Oman': '🇴🇲', 'Pakistan': '🇵🇰', 'Palau': '🇵🇼', 'Palestine': '🇵🇸',
            'Panama': '🇵🇦', 'Papua New Guinea': '🇵🇬', 'Paraguay': '🇵🇾', 'Peru': '🇵🇪',
            'Philippines': '🇵🇭', 'Poland': '🇵🇱', 'Portugal': '🇵🇹', 'Puerto Rico': '🇵🇷',
            'Qatar': '🇶🇦', 'Republic of Ireland': '🇮🇪', 'Romania': '🇷🇴', 'Russia': '🇷🇺',
            'Rwanda': '🇷🇼', 'Saint Kitts and Nevis': '🇰🇳', 'Saint Lucia': '🇱🇨',
            'Saint Vincent and the Grenadines': '🇻🇨', 'Samoa': '🇼🇸', 'San Marino': '🇸🇲',
            'São Tomé and Príncipe': '🇸🇹', 'Saudi Arabia': '🇸🇦', 'Scotland': '🏴󠁧󠁢󠁳󠁣󠁴󠁿',
            'Senegal': '🇸🇳', 'Serbia': '🇷🇸', 'Seychelles': '🇸🇨', 'Sierra Leone': '🇸🇱',
            'Singapore': '🇸🇬', 'Slovakia': '🇸🇰', 'Slovenia': '🇸🇮', 'Solomon Islands': '🇸🇧',
            'Somalia': '🇸🇴', 'South Africa': '🇿🇦', 'South Sudan': '🇸🇸', 'Spain': '🇪🇸',
            'Sri Lanka': '🇱🇰', 'Sudan': '🇸🇩', 'Suriname': '🇸🇷', 'Sweden': '🇸🇪',
            'Switzerland': '🇨🇭', 'Syria': '🇸🇾', 'Tajikistan': '🇹🇯', 'Tanzania': '🇹🇿',
            'Thailand': '🇹🇭', 'Timor-Leste': '🇹🇱', 'Togo': '🇹🇬', 'Tonga': '🇹🇴',
            'Trinidad and Tobago': '🇹🇹', 'Tunisia': '🇹🇳', 'Turkey': '🇹🇷', 'Turkmenistan': '🇹🇲',
            'Turks and Caicos Islands': '🇹🇨', 'Tuvalu': '🇹🇻', 'Uganda': '🇺🇬', 'Ukraine': '🇺🇦',
            'United Arab Emirates': '🇦🇪', 'United States': '🇺🇸', 'Uruguay': '🇺🇾',
            'US Virgin Islands': '🇻🇮', 'Uzbekistan': '🇺🇿', 'Vanuatu': '🇻🇺', 'Venezuela': '🇻🇪',
            'Vietnam': '🇻🇳', 'Wales': '🏴󠁧󠁢󠁷󠁬󠁳󠁿', 'Yemen': '🇾🇪', 'Zambia': '🇿🇲',
            'Zimbabwe': '🇿🇼'
          };

          function getFlag(name) {
            return FLAGS[name] || FLAGS[name?.trim()] || '🏳️';
          }

          let matches = [], standings = [];
          try { matches = JSON.parse(fs.readFileSync('api_matches.json', 'utf8')).matches || []; } catch(e) {}
          try { standings = JSON.parse(fs.readFileSync('api_standings.json', 'utf8')).standings || []; } catch(e) {}

          const now = new Date().toISOString();

          const processed = {
            updatedAt: now,
            matches: matches.map(m => ({
              id: m.id,
              homeTeam: {
                name: m.homeTeam.name,
                shortName: m.homeTeam.shortName,
                tla: m.homeTeam.tla,
                flag: getFlag(m.homeTeam.name)
              },
              awayTeam: {
                name: m.awayTeam.name,
                shortName: m.awayTeam.shortName,
                tla: m.awayTeam.tla,
                flag: getFlag(m.awayTeam.name)
              },
              status: m.status,
              minute: m.minute || (m.score?.duration === 'REGULAR' ? '90' : m.score?.duration),
              utcDate: m.utcDate,
              group: m.group,
              venue: m.venue || 'TBD',
              score: {
                home: m.score?.fullTime?.home ?? m.score?.halfTime?.home ?? null,
                away: m.score?.fullTime?.away ?? m.score?.halfTime?.away ?? null
              },
              halfTimeScore: {
                home: m.score?.halfTime?.home ?? null,
                away: m.score?.halfTime?.away ?? null
              },
              isLive: m.status === 'IN_PLAY' || m.status === 'PAUSED',
              isFinished: m.status === 'FINISHED',
              isScheduled: m.status === 'SCHEDULED' || m.status === 'TIMED'
            })),
            standings: standings,
            meta: {
              totalMatches: matches.length,
              liveMatches: matches.filter(m => m.status === 'IN_PLAY').length,
              upcomingMatches: matches.filter(m => m.status === 'SCHEDULED' || m.status === 'TIMED').length,
              finishedMatches: matches.filter(m => m.status === 'FINISHED').length
            }
          };

          fs.writeFileSync('scores.json', JSON.stringify(processed, null, 2));
          console.log(`✅ Processed ${processed.matches.length} matches`);
          EOF
          node process.js

      - name: Commit and push
        run: |
          git config user.name "WC Live Bot"
          git config user.email "bot@wclive.com"
          git add scores.json api_*.json
          git diff --cached --quiet || git commit -m "🔄 Update scores - $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
